# Workspace to monitor assignment
# Workspace 10 will be assigned to monitor 2 when available
# When monitor 2 is not present, aerospace will automatically assign it to available monitors
[workspace-to-monitor-force-assignment]
10 = 'secondary'  # Assign to secondary monitor, falls back to primary if unavailable
