# ==============================================================================
# General Settings
# ==============================================================================

# Change prefix from C-b to C-a (more ergonomic)
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Increase history limit
set -g history-limit 10000

# Enable focus events for better vim/nvim integration
set -g focus-events on

# Reduce escape time for faster command sequences (important for vim)
set -sg escape-time 10


# Set default terminal with true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable OSC 8 hyperlinks (requires tmux 3.2+)
set -as terminal-features ",*:hyperlinks"

# Enable OSC 52 clipboard (for copying over SSH)
set -s set-clipboard on
set -as terminal-features ',*:clipboard'
set -g allow-passthrough off

# automatic-rename-format kept for reference (overrides applied after TPM below)
set -g automatic-rename-format '#{pane_current_command}:#{b:pane_current_path}'

# Show pane titles in borders (requires tmux 3.2+)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# ==============================================================================
# Window & Pane Management
# ==============================================================================

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Split panes using % and " (keep current directory)
bind '%' split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Better split commands with | and -
bind | split-window -h -c '#{pane_current_path}'
bind \\ split-window -v -c '#{pane_current_path}'

# Navigate panes with Ctrl+hjkl (with smart-splits nvim integration)
# Check if we're in vim/neovim and pass through, otherwise handle in tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'if -F "#{pane_at_left}" "" "select-pane -L"'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'if -F "#{pane_at_bottom}" "" "select-pane -D"'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'if -F "#{pane_at_top}" "" "select-pane -U"'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'if -F "#{pane_at_right}" "" "select-pane -R"'

# Fallback for Ctrl+arrow keys (pane navigation, no wrap-around)
bind-key -n C-left if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -n C-down if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -n C-up if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -n C-right if -F '#{pane_at_right}' '' 'select-pane -R'

# Navigate windows with Shift+arrow keys
bind -n S-Left previous-window
bind -n S-Right next-window
bind -n S-Up choose-tree -s
bind -n S-Down switch-client -l

# Resize panes with prefix + hjkl (vim-style, repeatable)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Quick pane zoom toggle
bind z resize-pane -Z

# Aggressive resize (useful for multi-client sessions)
setw -g aggressive-resize off

# ==============================================================================
# Copy Mode (Vi-style)
# ==============================================================================

# Use vi-mode keys in copy mode
set-window-option -g mode-keys vi

# Vi-style selection and copy
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Enter copy mode with Ctrl+a [
bind [ copy-mode

# Paste with Ctrl+a ]
bind ] paste-buffer

# ==============================================================================
# Mouse Configuration
# ==============================================================================

# Mouse double-click to select word
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word

# Mouse triple-click to select line
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line

# Configure word separators for better text selection (excluding common URL chars)
setw -g word-separators ' @"=()[],{}|'
setw -ag word-separators "'"

# ==============================================================================
# Status Bar
# ==============================================================================

# NOTE: Status bar format removed - catppuccin theme handles this entirely.
# Leaving explicit settings here would conflict with the theme and show raw
# format strings until TPM fully loads.

# ==============================================================================
# Plugins Configuration
# ==============================================================================

# Catppuccin theme
set -g @catppuccin_flavour 'mocha'

# Command capture settings
set -g @command-capture-key t
set -g @command-capture-prompt-pattern '%'

# SSH split settings
set -g @ssh-split-h-key '%'
set -g @ssh-split-v-key '"'
set -g @ssh-split-keep-cwd true

# tmux-continuum settings (auto-save + auto-restore, sole restore mechanism)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'

# tmux-resurrect settings (minimal - just save/restore windows)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'true ~claude ~lazygit ~yazi ~ssh ~dbcert ~isaac'
set -g @resurrect-hook-pre-restore-all 'run-shell "touch /tmp/tmux-restoring && ~/bin/tmux-fix-resurrect"'
set -g @resurrect-hook-post-restore-all 'run-shell "rm -f /tmp/tmux-restoring"'
set -g @resurrect-hook-post-save-all 'run-shell "~/bin/tmux-validate-save"'

# tmux-yank settings
set -g @yank_action 'copy-pipe'

# tmux-fzf-url settings (handles wrapped URLs)
set -g @fzf-url-bind 'u'
set -g @fzf-url-fzf-options '-w 50% -h 50% --multi -0 --no-preview --no-border --tac'
set -g @fzf-url-history-limit '2000'
# Custom opener: copy to clipboard via OSC 52 (works over SSH)
set -g @fzf-url-open '~/bin/tmux-fzf-url-copy'

# ==============================================================================
# Plugin List
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'artemave/tmux_capture_last_command_output'
set -g @plugin 'pschmitt/tmux-ssh-split'
# Disable autobuild for tmux-which-key (use python3.12 to rebuild manually)
set -g @tmux-which-key-disable-autobuild 1
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'wfxr/tmux-fzf-url'
# IMPORTANT: Keep resurrect and continuum at the END to prevent theme conflicts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ==============================================================================
# Custom Keybindings
# ==============================================================================

# Reload config with Ctrl+a r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Create new session
bind N command-prompt -I "#{b:pane_current_path}" -p "Session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# Rename current session (prefix+S)
bind S command-prompt -I "#{session_name}" -p "Session name:" "rename-session '%%'"

# Auto-rename new sessions to basename of working directory (skip during restore)
set-hook -g after-new-session 'run-shell "[ -f /tmp/tmux-restoring ] || tmux rename-session -t \"#{session_name}\" \"$(basename \"#{pane_current_path}\")\" 2>/dev/null || true"'

# Prevent Claude Code agent panes from stealing focus
# When a split happens from a pane whose title contains "Claude", snap focus back
set-hook -g after-split-window 'if-shell "tmux display-message -p -t \"{last}\" \"#{pane_title}\" | grep -q Claude" "select-pane -l"'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# Post-TPM Overrides (must come after TPM to override plugin defaults)
# ==============================================================================

# Override catppuccin theme's status-interval (default 5s causes jitter)
set -g status-interval 15
# Disable automatic-rename globally (tmux-pane-title.sh manages names)
set -g automatic-rename off
